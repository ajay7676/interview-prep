<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform - 2D</title>
    <style>
        #box{
            width: 250px;
            height: 150px;
            background-color: tomato;
            margin: 150px 30px;
            /* transform: rotate(90deg); */
            transform: skewX(30deg);
        }
    </style>
</head>
<body>
    <h1> CSS TRANSFORM 2D</h1>
    <div id="box"> Ajay Chauhan</div>
</body>
</html>
