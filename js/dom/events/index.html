  <!-- BUBBLING EVENT &  CAPTURING EVENT -->

  <div id="myDiv1">
    <h2>Bubbling:</h2>
    <p id="myP1">Click me!</p>
  </div><br>
  
  <div id="myDiv2">
    <h2>Capturing:</h2>
    <p id="myP2">Click me!</p>
  </div>
   <script>
    console.log("Event Bubbling")
     document.getElementById("myDiv1").addEventListener( "click" , () =>{
          console.log("Oranage box  was clicked")
       } , false)
       document.getElementById("myP1").addEventListener( "click" , () =>{
          console.log("White box was clicked")
       } , false)

       console.log("Capaturing Event");

     document.getElementById("myDiv2").addEventListener( "click" , () =>{
          console.log("Oranage box  was clicked")
       } , true)
       document.getElementById("myP2").addEventListener( "click" , () =>{
          console.log("White box was clicked")
       } , true)
      
   </script>
   





</body>
