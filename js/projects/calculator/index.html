<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Made Calcualtor Using DOM</title>
</head>
<body>
    <div class="calculator">
        <div class="d-row output">0</div>
        <div class="input">
          <div class="d-row">
            <button class="w-50">C</button>
            <button>&larr;</button>
            <button>&divide;</button>
          </div>
          <div class="d-row">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>&times;</button>
          </div>
          <div class="d-row">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
          </div>
          <div class="d-row">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
          </div>
          <div class="d-row">
            <button class="w-75">0</button>
            <button>=</button>
          </div>
        </div>
      </div>
    <script src="index.js"></script>
</body>
</html>
