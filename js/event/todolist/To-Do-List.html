<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>To-Do List EventListener</title> 

    </head>
    <body>
        <main>
            <nav>
                <h1>To Do List</h1>
            </nav>
            <section>
                <div class="heading">
                    <form id="itemForm">
                        <input id="itemInput" name="listInput" type="text" placeholder="Enter Item Here">
                        <button name="submit" class="addItem">
                            Add Item
                        </button>
                    </form>
                </div>
                <div class="listContainer">
                    <h2 class="toDo">To Do</h2>
                    <ul class="list"></ul>
                    <h2 class="completed">Completed</h2>
                    <ul class="completedItems"></ul>
                </div>
                <div class="userActions">
                    <button id="clearToDo">Clear All To Do Items</button>
                    <button id="clearCompleted">Clear All Completed Items</button>
                </div>
            </section>
        </main>
    </body>
    <script src="todo.js" ></script>
</html>
